{% extends 'tienda_online/base.html' %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="fw-bold mb-4">{{ titulo }}</h1>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger small">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">
                Guardar
            </button>

            <a href="{% url 'lista_productos_admin' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </form>
    </div>
</div>

{% endblock %}
