<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TechStore M8</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">TechStore</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'home' %}">Catálogo</a>

            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'ver_carrito' %}">Carrito</a>

                {% if user.is_staff %}
                    <a class="nav-link" href="{% url 'lista_productos_admin' %}">Admin productos</a>
                {% endif %}

                <a class="nav-link" href="{% url 'logout' %}">Cerrar sesión</a>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container py-4">

    ...
<main class="container py-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</main>

</body>
</html>
